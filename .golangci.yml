# File: .golangci.yml
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - noctx
    - bodyclose
    - contextcheck
    - exhaustive
    - gocritic
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/souvik03-136/neurabalancer
  revive:
    rules:
      - name: exported
        severity: warning

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck]
