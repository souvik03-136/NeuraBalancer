version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"

x-db-env: &db-env
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: ${DB_NAME:-neurabalancer}
  DB_USER: ${DB_USER:-neura_user}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
  DB_SSLMODE: ${DB_SSLMODE:-disable}

x-obs-env: &obs-env
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: neurabalancer
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_FORMAT: json

services:

  # ── Load Balancer ─────────────────────────────────────────────────────────
  load-balancer:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.balancer
    image: neurabalancer/load-balancer:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      <<: [*db-env, *obs-env]
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: "8080"
      LB_STRATEGY: ${LB_STRATEGY:-least_connections}
      SERVERS: http://backend-1:8001,http://backend-2:8002,http://backend-3:8003
      ML_MODEL_ENDPOINT: http://ml-service:8081
      ML_MODEL_TIMEOUT_MS: ${ML_MODEL_TIMEOUT_MS:-300}
      ML_CIRCUIT_BREAKER_RESET_SECONDS: ${ML_CIRCUIT_BREAKER_RESET_SECONDS:-30}
      ML_CACHE_SIZE: ${ML_CACHE_SIZE:-1000}
      HEALTH_CHECK_INTERVAL_SECONDS: "5"
      HEALTH_CHECK_TIMEOUT_SECONDS: "3"
      HEALTH_CHECK_RETRIES: "3"
    depends_on:
      postgres:
        condition: service_healthy
      backend-1:
        condition: service_started
      backend-2:
        condition: service_started
      backend-3:
        condition: service_started
      ml-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - neurabalancer-net
    logging: *default-logging

  # ── Backend Servers ────────────────────────────────────────────────────────
  backend-1:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.backend
    image: neurabalancer/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      <<: *obs-env
      BACKEND_PORT: "8001"
      BACKEND_INSTANCE_ID: backend-1
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - neurabalancer-net
    logging: *default-logging

  backend-2:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.backend
    image: neurabalancer/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      <<: *obs-env
      BACKEND_PORT: "8002"
      BACKEND_INSTANCE_ID: backend-2
    expose:
      - "8002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - neurabalancer-net
    logging: *default-logging

  backend-3:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.backend
    image: neurabalancer/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      <<: *obs-env
      BACKEND_PORT: "8003"
      BACKEND_INSTANCE_ID: backend-3
    expose:
      - "8003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - neurabalancer-net
    logging: *default-logging

  # ── ML Model Service ───────────────────────────────────────────────────────
  # Starts in degraded mode if no model file exists yet.
  # Train first with: task ml-train
  # Then restart with: docker compose restart ml-service
  ml-service:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.ml
    image: neurabalancer/ml-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ML_SERVICE_PORT: "8081"
      MODEL_PATH: /app/models/load_balancer.onnx
      SCALER_PATH: /app/models/scaler.json
      MODEL_INPUT_NAME: ${MODEL_INPUT_NAME:-features}
      MODEL_OUTPUT_NAME: ${MODEL_OUTPUT_NAME:-predicted_score}
      MODEL_VERSION: ${MODEL_VERSION:-none}
      ONNX_LIB_PATH: /opt/onnxruntime/lib/libonnxruntime.so
    volumes:
      - ./ml/models:/app/models:ro
    expose:
      - "8081"
    # Always reports healthy — model absence is handled gracefully inside the server.
    # The load balancer circuit breaker handles 503s from /predict automatically.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 5s
    networks:
      - neurabalancer-net
    logging: *default-logging

  # ── TimescaleDB ────────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg14
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-neurabalancer}
      POSTGRES_USER: ${DB_USER:-neura_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "${DB_PORT_EXPOSE:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-neura_user} -d ${DB_NAME:-neurabalancer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neurabalancer-net
    logging: *default-logging

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    ports:
      - "${REDIS_PORT_EXPOSE:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neurabalancer-net
    logging: *default-logging

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - load-balancer
    networks:
      - neurabalancer-net
    logging: *default-logging

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - neurabalancer-net
    logging: *default-logging

  # ── Loki ───────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./configs/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - neurabalancer-net
    logging: *default-logging

  # ── Promtail ───────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.4
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./configs/loki/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - neurabalancer-net
    logging: *default-logging

  # ── Tempo ──────────────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.3.1
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    volumes:
      - ./configs/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    networks:
      - neurabalancer-net
    logging: *default-logging

  # ── OpenTelemetry Collector ────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.93.0
    restart: unless-stopped
    command: ["--config=/etc/otel/otel-collector.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    volumes:
      - ./configs/otel/otel-collector.yml:/etc/otel/otel-collector.yml:ro
    depends_on:
      - tempo
    networks:
      - neurabalancer-net
    logging: *default-logging

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:

networks:
  neurabalancer-net:
    driver: bridge