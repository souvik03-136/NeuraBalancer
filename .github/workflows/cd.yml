# File: .github/workflows/cd.yml
name: CD

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/neurabalancer

jobs:

  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: load-balancer
            dockerfile: deployments/docker/Dockerfile.balancer
          - name: backend
            dockerfile: deployments/docker/Dockerfile.backend

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BUILD_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via ArgoCD
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Update Helm values with new image tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          sed -i "s/tag:.*/tag: ${TAG}/" deployments/helm/charts/neurabalancer/values.yaml
          git config user.email "ci@neurabalancer"
          git config user.name  "CI"
          git add deployments/helm/charts/neurabalancer/values.yaml
          git commit -m "chore: bump image tag to ${TAG} [skip ci]"
          git push

      - name: Sync ArgoCD app
        uses: clowdhaus/argo-cd-action@v2.0.0
        with:
          command: app
          options: sync neurabalancer --prune --force
        env:
          ARGOCD_SERVER:     ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
