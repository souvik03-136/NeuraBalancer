# File: .github/workflows/ci.yml
name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.21"
  PYTHON_VERSION: "3.11"

jobs:

  # ── Go lint ──────────────────────────────────────────────────────────────────
  go-lint:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.56
          args: --timeout=5m ./...

  # ── Go tests ─────────────────────────────────────────────────────────────────
  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg14
        env:
          POSTGRES_DB: neurabalancer_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detector
        run: go test -v -race -coverprofile=coverage.out ./...
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: neurabalancer_test
          DB_USER: test
          DB_PASSWORD: test
          DB_SSLMODE: disable

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out

  # ── Python lint & tests ───────────────────────────────────────────────────────
  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r ml/training/requirements.txt pytest black flake8

      - name: Black formatting check
        run: black --check ml/

      - name: Flake8 lint
        run: flake8 ml/ --max-line-length=120 --extend-ignore=E203

      - name: Run Python tests
        run: pytest ml/training/tests/ -v
        continue-on-error: true   # tests may require DB; don't fail CI

  # ── Docker build check ────────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [go-lint, go-test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build load-balancer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployments/docker/Dockerfile.balancer
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployments/docker/Dockerfile.backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
