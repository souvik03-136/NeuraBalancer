# File: Taskfile.yml
version: "3"

dotenv: [".env"]

vars:
  IMAGE_TAG:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  BUILD_TIME:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ

tasks:

  # ── Setup ────────────────────────────────────────────────────────────────────
  setup:
    desc: "First-time project setup"
    cmds:
      - cp -n .env.example .env || true
      - pip install pre-commit
      - pre-commit install --install-hooks
      - go mod download
      - pip install -r ml/training/requirements.txt
      - mkdir -p ml/models logs bin
      - echo "Setup complete. Edit .env before running 'task up'."

  # ── Local dev stack ───────────────────────────────────────────────────────────
  up:
    desc: "Start the full stack (builds images if needed)"
    cmds:
      - docker compose up -d --build
      - echo "Stack started. Grafana → http://localhost:3000 (admin / $GRAFANA_ADMIN_PASSWORD)"

  down:
    desc: "Stop all containers"
    cmds:
      - docker compose down

  down-v:
    desc: "Stop all containers and delete volumes (data loss!)"
    cmds:
      - docker compose down -v

  logs:
    desc: "Stream logs for all services"
    cmds:
      - docker compose logs -f

  logs-lb:
    desc: "Stream load-balancer logs only"
    cmds:
      - docker compose logs -f load-balancer

  ps:
    desc: "Show container statuses"
    cmds:
      - docker compose ps

  restart:
    desc: "Restart the load-balancer container"
    cmds:
      - docker compose restart load-balancer

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    desc: "Build all Go binaries"
    cmds:
      - task: build-balancer
      - task: build-backend

  build-balancer:
    desc: "Build the load-balancer binary"
    cmds:
      - |
        CGO_ENABLED=0 go build \
          -ldflags="-w -s -X main.buildVersion={{.IMAGE_TAG}} -X main.buildTime={{.BUILD_TIME}}" \
          -trimpath \
          -o bin/neurabalancer \
          ./backend/cmd/api

  build-backend:
    desc: "Build the backend server binary"
    cmds:
      - |
        CGO_ENABLED=0 go build \
          -ldflags="-w -s" \
          -trimpath \
          -o bin/backend-server \
          ./backend/cmd/server

  # ── Testing ───────────────────────────────────────────────────────────────────
  test:
    desc: "Run all Go tests with race detector"
    cmds:
      - go test -v -race -count=1 ./...

  test-coverage:
    desc: "Run tests and open coverage report"
    cmds:
      - go test -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out

  test-python:
    desc: "Run Python tests"
    cmds:
      - pytest ml/training/tests/ -v

  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    desc: "Run golangci-lint"
    cmds:
      - golangci-lint run ./...

  lint-fix:
    desc: "Run golangci-lint with auto-fix"
    cmds:
      - golangci-lint run --fix ./...

  fmt:
    desc: "Format Go and Python code"
    cmds:
      - gofmt -w .
      - black ml/

  # ── Database ─────────────────────────────────────────────────────────────────
  db-migrate:
    desc: "Run database migrations against the running postgres container"
    cmds:
      - |
        docker run --rm \
          --network neurabalancer_neurabalancer-net \
          -v $(pwd)/backend/migrations:/migrations \
          migrate/migrate \
          -path=/migrations \
          -database "postgres://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT:-5432}/${DB_NAME}?sslmode=${DB_SSLMODE:-disable}" \
          up

  db-rollback:
    desc: "Roll back the last database migration"
    cmds:
      - |
        docker run --rm \
          --network neurabalancer_neurabalancer-net \
          -v $(pwd)/backend/migrations:/migrations \
          migrate/migrate \
          -path=/migrations \
          -database "postgres://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT:-5432}/${DB_NAME}?sslmode=${DB_SSLMODE:-disable}" \
          down 1

  db-reset:
    desc: "Drop and recreate all tables (WARNING: destroys data)"
    cmds:
      - task: db-rollback
      - task: db-migrate

  db-psql:
    desc: "Open a psql shell in the running postgres container"
    cmds:
      - docker compose exec postgres psql -U ${DB_USER} -d ${DB_NAME}

  # ── ML ───────────────────────────────────────────────────────────────────────
  ml-train:
    desc: "Train the ML model (requires running DB with data)"
    cmds:
      - cd ml/training && python train_model.py

  ml-serve:
    desc: "Start the ML model server locally (outside Docker)"
    cmds:
      - |
        ML_SERVICE_PORT=${ML_SERVICE_PORT:-8081} \
        MODEL_PATH=ml/models/load_balancer.onnx \
        SCALER_PATH=ml/models/scaler.json \
        go run ./ml/model-server/

  # ── Docker helpers ────────────────────────────────────────────────────────────
  docker-build-all:
    desc: "Build all Docker images with the current git tag"
    cmds:
      - docker compose build --build-arg BUILD_VERSION={{.IMAGE_TAG}}

  docker-push:
    desc: "Push images to the configured registry (set REGISTRY env var)"
    cmds:
      - docker compose push

  # ── Load testing ─────────────────────────────────────────────────────────────
  load-test:
    desc: "Run 1000 requests at 50 concurrent (requires 'hey' tool)"
    cmds:
      - hey -n 1000 -c 50 -m POST http://localhost:${APP_PORT:-8080}/api/v1/request

  # ── Cleanup ───────────────────────────────────────────────────────────────────
  clean:
    desc: "Remove build artefacts"
    cmds:
      - rm -rf bin/ coverage.out

  clean-all:
    desc: "Remove build artefacts, Docker images, and volumes"
    cmds:
      - task: clean
      - docker compose down -v --rmi local
