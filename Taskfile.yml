# File: Taskfile.yml
version: "3"

dotenv: [".env"]

vars:
  IMAGE_TAG:
    sh: git describe --tags --always --dirty 2>nul || echo dev
  BUILD_TIME:
    sh: powershell -Command "[DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ')"

tasks:

  # ── Setup ────────────────────────────────────────────────────────────────────
  setup:
    desc: "First-time project setup"
    cmds:
      - powershell -Command "if (!(Test-Path .env)) { Copy-Item .env.example .env; Write-Host 'Created .env' } else { Write-Host '.env already exists' }"
      - pip install pre-commit
      - pre-commit install --install-hooks
      - go mod download
      - pip install -r ml/training/requirements.txt
      - powershell -Command "New-Item -ItemType Directory -Force -Path ml/models,logs,bin | Out-Null; Write-Host 'Directories ready'"
      - "echo \"Setup complete. Edit .env then run: task up\""

  # ── Local dev stack ───────────────────────────────────────────────────────────
  up:
    desc: "Start the full stack (builds images if needed)"
    cmds:
      - docker compose up -d --build
      - echo "Stack started. Grafana at http://localhost:3000"

  down:
    desc: "Stop all containers"
    cmds:
      - docker compose down

  down-v:
    desc: "Stop all containers and delete volumes (data loss!)"
    cmds:
      - docker compose down -v

  logs:
    desc: "Stream logs for all services"
    cmds:
      - docker compose logs -f

  logs-lb:
    desc: "Stream load-balancer logs only"
    cmds:
      - docker compose logs -f load-balancer

  ps:
    desc: "Show container statuses"
    cmds:
      - docker compose ps

  restart:
    desc: "Restart the load-balancer container"
    cmds:
      - docker compose restart load-balancer

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    desc: "Build all Go binaries"
    cmds:
      - task: build-balancer
      - task: build-backend

  build-balancer:
    desc: "Build the load-balancer binary"
    cmds:
      - powershell -Command "$env:CGO_ENABLED='0'; go build -ldflags='-w -s' -trimpath -o bin/neurabalancer.exe ./backend/cmd/api; if ($LASTEXITCODE -eq 0) { Write-Host 'load-balancer built OK' } else { exit 1 }"

  build-backend:
    desc: "Build the backend server binary"
    cmds:
      - powershell -Command "$env:CGO_ENABLED='0'; go build -ldflags='-w -s' -trimpath -o bin/backend-server.exe ./backend/cmd/server; if ($LASTEXITCODE -eq 0) { Write-Host 'backend-server built OK' } else { exit 1 }"

  # ── Testing ───────────────────────────────────────────────────────────────────
  test:
    desc: "Run all Go tests with race detector"
    cmds:
      - go test -v -race -count=1 ./...

  test-coverage:
    desc: "Run tests and open HTML coverage report"
    cmds:
      - go test -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out

  test-python:
    desc: "Run Python tests"
    cmds:
      - pytest ml/training/tests/ -v

  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    desc: "Run golangci-lint"
    cmds:
      - golangci-lint run ./...

  lint-fix:
    desc: "Run golangci-lint with auto-fix"
    cmds:
      - golangci-lint run --fix ./...

  fmt:
    desc: "Format Go and Python code"
    cmds:
      - gofmt -w .
      - black ml/

  # ── Database ─────────────────────────────────────────────────────────────────
  db-migrate:
    desc: "Run database migrations against the running postgres container"
    cmds:
      - powershell -Command "docker run --rm --network neurabalancer_neurabalancer-net -v ${PWD}/backend/migrations:/migrations migrate/migrate -path=/migrations -database \"postgres://$env:DB_USER`:$env:DB_PASSWORD`@postgres:5432/$env:DB_NAME`?sslmode=disable\" up"

  db-rollback:
    desc: "Roll back the last database migration"
    cmds:
      - powershell -Command "docker run --rm --network neurabalancer_neurabalancer-net -v ${PWD}/backend/migrations:/migrations migrate/migrate -path=/migrations -database \"postgres://$env:DB_USER`:$env:DB_PASSWORD`@postgres:5432/$env:DB_NAME`?sslmode=disable\" down 1"

  db-reset:
    desc: "Drop and recreate all tables (WARNING: destroys data)"
    cmds:
      - task: db-rollback
      - task: db-migrate

  db-psql:
    desc: "Open a psql shell in the running postgres container"
    cmds:
      - docker compose exec postgres psql -U $DB_USER -d $DB_NAME

  db-check:
    desc: "Show tables and server rows in the database"
    cmds:
      - docker compose exec postgres psql -U $DB_USER -d $DB_NAME -c "\dt"
      - docker compose exec postgres psql -U $DB_USER -d $DB_NAME -c "SELECT id, name, is_active FROM servers;"

  # ── Health checks ─────────────────────────────────────────────────────────────
  health:
    desc: "Check all API health endpoints"
    cmds:
      - powershell -Command "Write-Host '--- Liveness ---'; (Invoke-RestMethod http://localhost:8080/health/live) | ConvertTo-Json; Write-Host '--- Readiness ---'; (Invoke-RestMethod http://localhost:8080/health/ready) | ConvertTo-Json; Write-Host '--- Servers ---'; (Invoke-RestMethod http://localhost:8080/api/v1/servers) | ConvertTo-Json"

  # ── ML ───────────────────────────────────────────────────────────────────────
  ml-train:
    desc: "Train the ML model (requires running DB with data)"
    cmds:
      - powershell -Command "Push-Location ml/training; python train_model.py; Pop-Location"

  ml-serve:
    desc: "Start the ML model server locally (outside Docker)"
    cmds:
      - powershell -Command "$env:ML_SERVICE_PORT='8081'; $env:MODEL_PATH='ml/models/load_balancer.onnx'; $env:SCALER_PATH='ml/models/scaler.json'; go run ./ml/model-server/"

  # ── Docker helpers ────────────────────────────────────────────────────────────
  docker-build-all:
    desc: "Build all Docker images"
    cmds:
      - docker compose build

  docker-push:
    desc: "Push images to the configured registry"
    cmds:
      - docker compose push

  # ── Load testing ─────────────────────────────────────────────────────────────
  load-test:
    desc: "Send 100 test requests through the load balancer"
    cmds:
      - |
        powershell -Command "1..100 | ForEach-Object { try { Invoke-RestMethod -Method POST -Uri 'http://localhost:8080/api/v1/request' -ContentType 'application/json' -Body \"{`\"request`\": $_}\" | Out-Null } catch {} }; Write-Host '100 requests sent'"

  load-test-hey:
    desc: "Load test with hey (install: go install github.com/rakyll/hey@latest)"
    cmds:
      - "hey -n 1000 -c 50 -m POST -H \"Content-Type: application/json\" -d '{\"test\":true}' http://localhost:8080/api/v1/request"

  # ── Cleanup ───────────────────────────────────────────────────────────────────
  clean:
    desc: "Remove build artefacts"
    cmds:
      - powershell -Command "Remove-Item -Recurse -Force -ErrorAction SilentlyContinue bin,coverage.out; Write-Host 'Cleaned'"

  clean-all:
    desc: "Remove build artefacts, Docker images, and volumes"
    cmds:
      - task: clean
      - docker compose down -v --rmi local