{{- /* File: deployments/helm/charts/neurabalancer/templates/secrets.yaml */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "neurabalancer.fullname" . }}-secrets
  labels: {{ include "neurabalancer.labels" . | nindent 4 }}
type: Opaque
data:
  db-password: {{ .Values.db.password | b64enc | quote }}
  redis-password: {{ .Values.redis.password | b64enc | quote }}
  grafana-admin-password: {{ .Values.grafana.adminPassword | b64enc | quote }}
