{{- /* File: deployments/helm/charts/neurabalancer/templates/service.yaml */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "neurabalancer.fullname" . }}-balancer
  labels: {{ include "neurabalancer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/component: balancer
    {{ include "neurabalancer.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
