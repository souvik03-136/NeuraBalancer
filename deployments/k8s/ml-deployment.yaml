# File: deployments/k8s/ml-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neurabalancer-ml
  labels:
    app: neurabalancer
    component: ml-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neurabalancer
      component: ml-service
  template:
    metadata:
      labels:
        app: neurabalancer
        component: ml-service
    spec:
      containers:
        - name: ml-service
          image: ghcr.io/souvik03-136/neurabalancer-ml-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: ML_SERVICE_PORT
              value: "8081"
            - name: MODEL_PATH
              value: /app/models/load_balancer.onnx
            - name: SCALER_PATH
              value: /app/models/scaler.json
            - name: MODEL_INPUT_NAME
              value: features
            - name: MODEL_OUTPUT_NAME
              value: predicted_score
            - name: ONNX_LIB_PATH
              value: /opt/onnxruntime/lib/libonnxruntime.so
          volumeMounts:
            - name: models
              mountPath: /app/models
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      volumes:
        - name: models
          # In production: use an init container or CI to inject the model,
          # or mount from a PVC/S3-backed volume.
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: neurabalancer-ml
  labels:
    app: neurabalancer
    component: ml-service
spec:
  selector:
    app: neurabalancer
    component: ml-service
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8081
      targetPort: http
